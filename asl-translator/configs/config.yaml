# =============================================================================
# CS 4701 — ASL Fingerspelling & Sign Recognition: Master Config
# =============================================================================

# ---------------------------- Paths -----------------------------------------
paths:
  data_root: "data"
  raw_videos: "data/raw/videos"
  wlasl_json: "data/raw/WLASL_v0.3.json"
  processed: "data/processed"
  landmarks: "data/processed/landmarks"
  splits: "data/processed/splits"
  checkpoints: "checkpoints"
  logs: "logs"
  figures: "figures"

# ---------------------------- Dataset ---------------------------------------
dataset:
  # Number of top-frequency glosses to keep. Status report scope: 20-50 signs.
  num_classes: 50
  min_videos_per_class: 7
  # Train/val/test split ratios (sum to 1.0)
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  # Variable-length sequences are bucketed and padded; the cap below trims
  # overly long clips to keep memory bounded.
  max_seq_len: 96
  min_seq_len: 8
  # Cross-subject test: hold out specific signers if signer metadata is present
  cross_subject: false

# ---------------------------- Landmark extraction ---------------------------
mediapipe:
  static_image_mode: false
  max_num_hands: 2
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  # Use Holistic if you want body+face; Hands is faster for fingerspelling.
  use_holistic: false

preprocessing:
  # Normalize each frame's landmarks relative to the wrist (joint 0).
  wrist_relative: true
  # Scale-normalize by hand bounding box so distance-from-camera is invariant.
  scale_normalize: true
  # Temporal smoothing window (odd integer). 1 disables smoothing.
  smoothing_window: 5
  # Linearly interpolate frames where MediaPipe failed to detect a hand.
  interpolate_missing: true
  # Drop a sample if more than this fraction of frames had no detection.
  max_missing_frame_ratio: 0.4
  # Two hands -> 21*3*2 = 126 dims; one hand -> 21*3 = 63 dims.
  num_hands: 2

augmentation:
  # Applied at training time only.
  enable: true
  horizontal_flip_prob: 0.5
  gaussian_noise_std: 0.01
  time_warp_prob: 0.3
  time_warp_factor_range: [0.85, 1.15]
  random_drop_frame_prob: 0.05

# ---------------------------- Models ----------------------------------------
lstm:
  hidden_size: 256
  num_layers: 2
  bidirectional: true
  dropout: 0.4
  input_dropout: 0.1

transformer:
  d_model: 192
  nhead: 6
  num_encoder_layers: 4
  dim_feedforward: 512
  dropout: 0.2
  max_position_embeddings: 128

# ---------------------------- Training --------------------------------------
training:
  batch_size: 32
  num_workers: 2
  epochs: 60
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  scheduler: "cosine"      # one of: cosine, plateau, none
  warmup_epochs: 3
  early_stopping_patience: 12
  # Optional CTC training mode for sequence-level (fingerspelling) outputs.
  ctc_mode: false
  label_smoothing: 0.1
  mixed_precision: false   # set true on CUDA
  seed: 42

# ---------------------------- Real-time inference ---------------------------
realtime:
  window_size: 32           # frames in sliding window
  stride: 4                 # how many new frames before re-predicting
  smoothing_alpha: 0.6      # exponential smoothing on predicted probs
  confidence_threshold: 0.55
  display_top_k: 3
  target_latency_ms: 300
  camera_index: 0
  display_width: 960
  display_height: 720
